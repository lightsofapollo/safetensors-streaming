[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "safetensors-streaming-cu12"
version = "0.1.1"
description = "CUDA 12 accelerated backend for safetensors-streaming"
requires-python = ">=3.10"
license = { file = "LICENSE" }
authors = [
    { name = "James Lal", email = "james@littlebearlabs.io" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.urls]
Repository = "https://github.com/lightsofapollo/safetensors-streaming"

[tool.maturin]
manifest-path = "crates/sst-python/Cargo.toml"
module-name = "safetensors_streaming_cu12.safetensors_streaming"
python-source = "python-cuda"
features = ["pyo3/extension-module", "cuda"]
